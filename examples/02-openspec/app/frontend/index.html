<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge of the Day</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1>Challenge of the Day</h1>
      <p id="course-name"></p>
    </header>

    <section id="student-section">
      <div id="student-field-container">
        <label for="student-input">Your name</label>
        <div id="autocomplete-wrapper">
          <input type="text" id="student-input" placeholder="Type your name..." autocomplete="off">
          <ul id="student-suggestions" class="suggestions hidden"></ul>
        </div>
        <p id="student-status" class="status-message hidden"></p>
      </div>
    </section>

    <section id="loading-section">
      <div id="loading-indicator">
        <div class="spinner"></div>
        <p>Loading today's challenge...</p>
      </div>
    </section>

    <section id="error-section" class="hidden">
      <div class="error-box">
        <p id="error-message"></p>
      </div>
    </section>

    <section id="no-challenge-section" class="hidden">
      <div class="info-box">
        <h2>No Challenge Available</h2>
        <p id="no-challenge-message">There is no challenge configured for today. Please check back later.</p>
      </div>
    </section>

    <section id="challenge-section" class="hidden">
      <div id="challenge-header">
        <h2 id="challenge-title"></h2>
        <div id="challenge-meta">
          <span id="challenge-topics"></span>
          <span id="challenge-difficulty"></span>
        </div>
      </div>

      <div id="challenge-intro"></div>

      <div id="challenge-prompt"></div>

      <form id="response-form">
        <div id="response-fields"></div>

        <div id="form-errors" class="hidden">
          <ul id="form-errors-list"></ul>
        </div>

        <div id="submit-area">
          <button type="submit" id="submit-btn" disabled>Submit Response</button>
        </div>
      </form>
    </section>

    <section id="feedback-section" class="hidden">
      <div id="feedback-content"></div>
    </section>

    <section id="after-submission-section" class="hidden">
      <div id="after-submission-content"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
